<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Espace privé · accès protégé</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=JetBrains+Mono:wght@400;500;700&family=Manrope:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0a0a0a; --bg-card:#1a1a1a; --border:#262626; --border-strong:#333;
  --text:#f5f5f5; --text-dim:#888; --text-muted:#555; --accent:#d4ff3a; --danger:#ef4444;
}
*{margin:0;padding:0;box-sizing:border-box;}
html,body{
  background:var(--bg); color:var(--text); min-height:100vh;
  font-family:'Manrope',-apple-system,sans-serif; -webkit-font-smoothing:antialiased;
}
body{
  display:flex; align-items:center; justify-content:center; padding:24px;
  background-image:
    radial-gradient(circle at 15% 20%, rgba(212,255,58,0.06) 0%, transparent 40%),
    radial-gradient(circle at 85% 80%, rgba(168,85,247,0.05) 0%, transparent 45%);
}
.lock-card{
  width:100%; max-width:380px; background:var(--bg-card);
  border:1px solid var(--border); border-radius:8px; padding:36px 32px;
  animation:fadeUp .5s cubic-bezier(.22,1,.36,1) both;
}
@keyframes fadeUp{from{opacity:0;transform:translateY(12px);}to{opacity:1;transform:translateY(0);}}
.lock-icon{
  width:46px; height:46px; border:2px solid var(--accent); border-radius:50%;
  display:flex; align-items:center; justify-content:center; margin-bottom:20px;
}
.lock-icon svg{width:20px;height:20px;stroke:var(--accent);}
.lock-tag{
  font-family:'JetBrains Mono',monospace; font-size:10px; letter-spacing:.15em;
  text-transform:uppercase; color:var(--text-dim); margin-bottom:6px;
}
.lock-title{
  font-family:'Bebas Neue',sans-serif; font-size:38px; line-height:1;
  letter-spacing:-.01em; margin-bottom:6px;
}
.lock-sub{font-size:12.5px; color:var(--text-dim); margin-bottom:24px; line-height:1.5;}
.field{position:relative; margin-bottom:12px;}
.lock-input{
  width:100%; background:var(--bg); border:1px solid var(--border-strong);
  color:var(--text); font-family:'Manrope',sans-serif; font-size:15px;
  padding:13px 44px 13px 14px; border-radius:5px; transition:border-color .2s;
}
.lock-input:focus{outline:none; border-color:var(--accent);}
.lock-input::placeholder{color:var(--text-muted);}
.toggle-eye{
  position:absolute; right:8px; top:50%; transform:translateY(-50%);
  background:none; border:none; cursor:pointer; padding:6px;
  color:var(--text-muted); display:flex;
}
.toggle-eye:hover{color:var(--accent);}
.toggle-eye svg{width:18px;height:18px;}
.unlock-btn{
  width:100%; background:var(--accent); color:var(--bg); border:none;
  font-family:'Manrope',sans-serif; font-weight:800; font-size:14px;
  letter-spacing:.03em; text-transform:uppercase; padding:14px; border-radius:5px;
  cursor:pointer; transition:opacity .2s,transform .1s; margin-top:4px;
}
.unlock-btn:hover{opacity:.9;}
.unlock-btn:active{transform:scale(.99);}
.unlock-btn:disabled{opacity:.5; cursor:wait;}
.remember{
  display:flex; align-items:center; gap:8px; margin-top:16px;
  font-size:12px; color:var(--text-dim); cursor:pointer; user-select:none;
}
.remember input{accent-color:var(--accent); width:14px; height:14px; cursor:pointer;}
.lock-error{
  color:var(--danger); font-size:12.5px; margin-top:14px; min-height:16px;
  font-family:'JetBrains Mono',monospace;
}
.lock-foot{
  margin-top:22px; padding-top:16px; border-top:1px solid var(--border);
  font-family:'JetBrains Mono',monospace; font-size:9.5px; letter-spacing:.1em;
  text-transform:uppercase; color:var(--text-muted);
}
</style>
</head>
<body>
<div class="lock-card">
  <div class="lock-icon">
    <svg viewBox="0 0 24 24" fill="none" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
      <rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/>
    </svg>
  </div>
  <div class="lock-tag">Accès restreint</div>
  <div class="lock-title">Espace privé</div>
  <div class="lock-sub">Programme d'entraînement personnel. Saisissez le mot de passe pour déverrouiller.</div>

  <div class="field">
    <input type="password" id="pwd" class="lock-input" placeholder="Mot de passe" autocomplete="current-password">
    <button class="toggle-eye" id="eye" type="button" aria-label="Afficher le mot de passe">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M2 12s3.5-7 10-7 10 7 10 7-3.5 7-10 7-10-7-10-7z"/><circle cx="12" cy="12" r="3"/>
      </svg>
    </button>
  </div>

  <button class="unlock-btn" id="unlock">Déverrouiller</button>

  <label class="remember">
    <input type="checkbox" id="remember"> Se souvenir sur cet appareil
  </label>

  <div class="lock-error" id="err"></div>
  <div class="lock-foot">Contenu chiffré · AES-256-GCM</div>
</div>

  var ITER       = __ITER__;
  var LS_KEY     = "espace-prive-pwd";

  function b64ToBytes(b64){
    var bin = atob(b64), len = bin.length, out = new Uint8Array(len);
    for (var i=0;i<len;i++) out[i] = bin.charCodeAt(i);
    return out;
  }

  var SALT   = b64ToBytes(SALT_B64);
  var IV     = b64ToBytes(IV_B64);
  var CIPHER = b64ToBytes(CIPHER_B64);

  async function deriveKey(password){
    var enc = new TextEncoder();
    var baseKey = await crypto.subtle.importKey(
      "raw", enc.encode(password), "PBKDF2", false, ["deriveKey"]
    );
    return crypto.subtle.deriveKey(
      { name:"PBKDF2", salt:SALT, iterations:ITER, hash:"SHA-256" },
      baseKey, { name:"AES-GCM", length:256 }, false, ["decrypt"]
    );
  }

  async function tryUnlock(password){
    if (!window.crypto || !window.crypto.subtle) {
      var err = new Error("INSECURE_CONTEXT");
      err.code = "INSECURE_CONTEXT";
      throw err;
    }
    var key = await deriveKey(password);
    var plain = await crypto.subtle.decrypt({ name:"AES-GCM", iv:IV }, key, CIPHER);
    return new TextDecoder("utf-8").decode(new Uint8Array(plain));
  }

  function render(html){
    // document.open() réinitialise le document ; document.write() y injecte
    // le programme complet. Cette méthode exécute les scripts ET conserve
    // la même origine — donc le localStorage (progression, pesées) persiste.
    setTimeout(function(){
      document.open();
      document.write(html);
      document.close();
    }, 0);
  }

  var pwdEl     = document.getElementById("pwd");
  var btnEl     = document.getElementById("unlock");
  var errEl     = document.getElementById("err");
  var rememberEl= document.getElementById("remember");
  var eyeEl     = document.getElementById("eye");

  eyeEl.addEventListener("click", function(){
    pwdEl.type = (pwdEl.type === "password") ? "text" : "password";
    pwdEl.focus();
  });

  async function attempt(password, fromStorage){
    if (!password){ errEl.textContent = "Veuillez saisir le mot de passe."; return; }
    btnEl.disabled = true;
    btnEl.textContent = "Déverrouillage…";
    errEl.textContent = "";
    try {
      var html = await tryUnlock(password);
      if (rememberEl.checked) {
        try { localStorage.setItem(LS_KEY, password); } catch(e){}
      }
      render(html);
    } catch(e){
      btnEl.disabled = false;
      btnEl.textContent = "Déverrouiller";
      if (e && e.code === "INSECURE_CONTEXT") {
        // Web Crypto indisponible : page ouverte en local (file://) ou en HTTP
        errEl.innerHTML = "Déchiffrement indisponible ici.<br>"
          + "Ouvrez cette page via une adresse <b>https://</b> "
          + "(GitHub Pages), pas par double-clic sur le fichier.";
      } else {
        errEl.textContent = "Mot de passe incorrect.";
        if (fromStorage) { try { localStorage.removeItem(LS_KEY); } catch(e2){} }
        pwdEl.value = "";
        pwdEl.focus();
      }
    }
  }

  btnEl.addEventListener("click", function(){ attempt(pwdEl.value, false); });
  pwdEl.addEventListener("keydown", function(e){
    if (e.key === "Enter") attempt(pwdEl.value, false);
  });

  // Auto-déverrouillage si "se souvenir" a déjà été coché sur cet appareil
  (function(){
    var saved = null;
    try { saved = localStorage.getItem(LS_KEY); } catch(e){}
    if (saved) { rememberEl.checked = true; attempt(saved, true); }
    else { pwdEl.focus(); }
  })();
})();
